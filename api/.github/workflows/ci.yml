name: Build and Push Docker Image

# Lệnh này bảo Bot: Cứ khi nào có code mới đẩy lên nhánh 'main' thì thức dậy làm việc
on:
  push:
    branches:
      - main 

jobs:
  build-and-push:
    runs-on: ubuntu-latest # Bot sẽ mượn 1 cái máy ảo Linux của GitHub để chạy

    steps:
    - name: 1. Tải code mới nhất về
      uses: actions/checkout@v3

    - name: 2. Đăng nhập vào bãi đỗ Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 3. Đóng gói API thành Docker Image và đẩy lên bãi đỗ
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        # Thay 'linhfood-api' thành tên bạn muốn. Nó sẽ tự động gắn tên user của bạn ở đầu.
        tags: ${{ secrets.DOCKER_USERNAME }}/linhfood-api:latest